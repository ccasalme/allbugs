<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basic JavaScript Template</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      line-height: 1.6;
      background: #f5f7fb;
      color: #111;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 2rem;
    }
    h1 {
      margin-top: 0;
    }
    button {
      font: inherit;
      padding: 0.75rem 1.25rem;
      border: 1px solid #2563eb;
      background: #3b82f6;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <main>
    <h1>JavaScript Template</h1>
    <p>Use this template to start a simple JavaScript demo.</p>
    <button id="actionButton">Click me</button>
    <p id="output"></p>
  </main>

  <script>
    const button = document.getElementById('actionButton');
    const output = document.getElementById('output');

    button.addEventListener('click', () => {
      const now = new Date();
      output.textContent = `Button clicked at ${now.toLocaleTimeString()}.`;
    });
  </script>
</body>
</html>
